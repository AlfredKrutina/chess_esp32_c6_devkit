# Složí _site (Doxygen + firmware/) a nasadí na větev gh-pages → GitHub Pages (volitelné pro docs).
# Manifest pro aplikaci / OTA: používej raw z main (vždy 200): …/main/firmware/version.json
# Binárka po deployi: raw z gh-pages …/gh-pages/firmware/esp32_chess_v24.bin
# Pokud Pages vrací 404, zkontroluj Settings → Pages (branch gh-pages, / root) a že workflow doběhl.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
    - 'main/**'
    - 'components/**'
    - 'CMakeLists.txt'
    - 'README.md'
    - 'Doxyfile'
    - 'generate_docs.sh'
    - 'generate_mermaid_html.py'
    - 'docs/diagrams/**'
    - 'docs/reference/**'
    - 'docs/README.md'
    - 'docs/flutter/**'
    - 'scripts/render_docs.sh'
    - 'scripts/mermaid-puppeteer-ci.json'
    - 'gh-pages-ready/README.md'
    - 'gh-pages-ready/.nojekyll'
    - 'firmware/**'
    - 'partitions.csv'
    - 'sdkconfig'
    - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Doxygen, Graphviz, Mermaid CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
          npm install -g @mermaid-js/mermaid-cli

      - name: Build Doxygen HTML + Mermaid výstupy
        run: |
          ./generate_docs.sh
          ./scripts/render_docs.sh

      # Verze image drž v souladu s lokálním IDF (projekt sdkconfig hlásí IDF 5.5.x).
      - name: Build ESP-IDF firmware (OTA .bin na gh-pages)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/project" -w /project espressif/idf:v5.5.1 \
            bash -c "idf.py set-target esp32c6 && idf.py build"

      - name: Složit adresář pro GitHub Pages
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a docs/doxygen/html/. _site/
          cp -f docs/diagrams/diagrams_mermaid.html _site/diagrams_mermaid.html
          cp -f gh-pages-ready/.nojekyll _site/.nojekyll
          mkdir -p _site/firmware
          cp -f firmware/version.json _site/firmware/version.json
          if [ -f build/esp32_chess_v24.bin ]; then
            cp -f build/esp32_chess_v24.bin _site/firmware/esp32_chess_v24.bin
          else
            echo "::warning::Firmware bin chybí – zkontroluj ESP-IDF Docker build výše; OTA odkaz na .bin na Pages vrátí 404."
          fi

      - name: Kontrola _site/firmware před deployem
        run: |
          test -f _site/firmware/version.json || (echo "::error::Chybí _site/firmware/version.json" && exit 1)
          ls -la _site/firmware/
          if [ ! -f _site/firmware/esp32_chess_v24.bin ]; then
            echo "::warning::Na Pages není .bin — zkontroluj log Docker buildu (musí doběhnout úspěšně)."
          fi

      - name: Ověření manifestu (raw na main)
        run: |
          code=$(curl -fsSL -o /dev/null -w "%{http_code}" \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/firmware/version.json")
          test "$code" = "200"

      - name: Deploy na větev gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: false
