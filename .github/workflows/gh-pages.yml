# Nasadí obsah gh-pages-ready/ na větev gh-pages → GitHub Pages (zdroj: Branch).
# Po prvním běhu: Repo → Settings → Pages → Build: Deploy from branch → gh-pages / / (root).

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'gh-pages-ready/**'
      - 'docs/diagrams/**'
      - 'generate_mermaid_html.py'
      - 'scripts/render_docs.sh'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI + přegenerovat diagram HTML do gh-pages-ready
        run: |
          npm install -g @mermaid-js/mermaid-cli
          ./scripts/render_docs.sh

      - name: Deploy na větev gh-pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-ready
          publish_branch: gh-pages
          force_orphan: false
