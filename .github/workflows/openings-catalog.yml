name: Openings catalog

on:
  push:
    paths:
      - 'data/**'
      - 'tools/openings/**'
      - '.github/workflows/openings-catalog.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'tools/openings/**'
      - '.github/workflows/openings-catalog.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validators
        run: pip install jsonschema python-chess
      - name: Validate and sync catalog
        run: |
          python3 tools/openings/sync_catalog.py --validate --physical-rules --copy
          git diff --exit-code components/web_server_task/web/data/openings_catalog.json flutter_czechmate/assets/data/openings_catalog.json
