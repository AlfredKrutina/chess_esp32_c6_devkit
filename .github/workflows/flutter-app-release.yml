# Android APK + macOS DMG + Windows EXE (Inno Setup) → GitHub Releases (stažení z GitHubu bez App Store).
#
# Spuštění:
#   - Automaticky: push na main/master mění flutter_czechmate/** nebo tento workflow
#     → release tag app-<verze>-ci<run_number> (kvůli opakovaným buildům bez kolize tagu)
#   - Ručně: Actions → Run workflow → tag app-<verze> z pubspec
#   - Tag: git push origin app-1.2.3 → přesný název release = tag
#
# Poznámky:
#   - Android release je podepsaný debug klíčem z CI (stažení mimo Obchod Play → povolit „neznámý zdroj“).
#   - macOS DMG není notářsky podepsaný → při prvním spuštění může být potřeba obejít Gatekeeper (klik pravým → Otevřít).
#   - Windows: Inno Setup → czechmate-<ver>-windows-setup.exe (bez kódového podpisu → SmartScreen může varovat).

name: Flutter app release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'app-*'
    paths:
      - 'flutter_czechmate/**'
      - '.github/workflows/flutter-app-release.yml'

permissions:
  contents: write

concurrency:
  group: flutter-app-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.out.outputs.release_tag }}
      asset_version: ${{ steps.out.outputs.asset_version }}
      asset_safe: ${{ steps.out.outputs.asset_safe }}
      asset_version_display: ${{ steps.out.outputs.asset_version_display }}
    steps:
      - uses: actions/checkout@v4

      - id: out
        run: |
          VER=$(grep '^version:' flutter_czechmate/pubspec.yaml | awk '{print $2}')
          SAFE=$(echo "$VER" | tr '+' '-')
          echo "asset_version=$VER" >> "$GITHUB_OUTPUT"
          echo "asset_safe=$SAFE" >> "$GITHUB_OUTPUT"
          BASE="${VER%%+*}"
          echo "asset_version_display=$BASE" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=app-$BASE" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=app-${BASE}-ci${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

  android:
    needs: meta
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_czechmate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            tools platform-tools
            platforms;android-35
            build-tools;35.0.0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Přejmenovat APK pro release
        working-directory: ${{ github.workspace }}
        run: |
          cp -f flutter_czechmate/build/app/outputs/flutter-apk/app-release.apk \
            "czechmate-${{ needs.meta.outputs.asset_safe }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: czechmate-${{ needs.meta.outputs.asset_safe }}-android.apk

  macos:
    needs: meta
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_czechmate
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: CocoaPods (macOS)
        working-directory: flutter_czechmate/macos
        run: pod install --repo-update

      - run: flutter build macos --release

      - name: Složit DMG
        working-directory: ${{ github.workspace }}
        run: |
          APP="flutter_czechmate/build/macos/Build/Products/Release/czechmate.app"
          test -d "$APP"
          DMG="czechmate-${{ needs.meta.outputs.asset_safe }}-macos.dmg"
          hdiutil create -volname "CzechMate ${{ needs.meta.outputs.asset_version }}" \
            -srcfolder "$APP" -ov -format UDZO -fs HFS+ "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: czechmate-${{ needs.meta.outputs.asset_safe }}-macos.dmg

  windows:
    needs: meta
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Windows release build
        working-directory: flutter_czechmate
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      - name: Compile installer (Inno Setup)
        working-directory: ${{ github.workspace }}
        run: |
          $display = "${{ needs.meta.outputs.asset_version_display }}"
          $safe = "${{ needs.meta.outputs.asset_safe }}"
          $src = Join-Path $env:GITHUB_WORKSPACE "flutter_czechmate\build\windows\x64\runner\Release"
          $iss = Join-Path $env:GITHUB_WORKSPACE "flutter_czechmate\installer\windows\CzechMateSetup.iss"
          if (-not (Test-Path $src)) { throw "Missing Flutter output: $src" }
          if (-not (Test-Path $iss)) { throw "Missing ISS: $iss" }
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found (Inno Setup)." }
          & $iscc /DMyAppDisplayVersion="$display" /DMyAppOutputVersion="$safe" /DMyAppSourceDir="$src" $iss

      - name: Verify installer on repo root
        working-directory: ${{ github.workspace }}
        run: |
          $exe = "czechmate-${{ needs.meta.outputs.asset_safe }}-windows-setup.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "Expected $exe at repository root"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: czechmate-${{ needs.meta.outputs.asset_safe }}-windows-setup.exe

  publish:
    needs: [meta, android, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist

      - name: Vypsat soubory
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          name: CzechMate ${{ needs.meta.outputs.asset_version }}
          files: dist/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
