# Po změně zdrojů diagramů přegeneruje HTML (Python) a SVG/PNG architektury (Mermaid CLI).
# Vygenerované soubory commitne zpět (bez smyčky: trigger jen na zdroje, ne na výstupy).

name: Docs — diagramy

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/diagrams/mermaid_diagrams.txt'
      - 'docs/diagrams/sources/**'
      - 'docs/diagrams/tasks_architecture.md'
      - 'docs/diagrams/README.md'
      - 'generate_mermaid_html.py'
      - 'scripts/render_docs.sh'
      - '.github/workflows/docs-diagrams.yml'
  pull_request:
    paths:
      - 'docs/diagrams/mermaid_diagrams.txt'
      - 'docs/diagrams/sources/**'
      - 'docs/diagrams/tasks_architecture.md'
      - 'docs/diagrams/README.md'
      - 'generate_mermaid_html.py'
      - 'scripts/render_docs.sh'
      - '.github/workflows/docs-diagrams.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render diagrams
        run: ./scripts/render_docs.sh

      - name: Commit rendered outputs (push na main/master jen)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/diagrams_mermaid.html \
                  docs/diagrams/*.svg \
                  docs/diagrams/*.png || true
          if git diff --staged --quiet; then
            echo "Žádné změny výstupů."
          else
            git commit -m "chore(docs): regenerate Mermaid outputs"
            git push
          fi
