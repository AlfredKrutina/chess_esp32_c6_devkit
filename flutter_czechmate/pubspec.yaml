name: czechmate
description: CzechMate — Flutter port (ESP šachovnice + BLE/HTTP/WS).
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  archive: ^4.0.9
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  flutter_blue_plus: ^1.32.12
  chess: ^0.8.1
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  network_info_plus: ^6.1.4
  image_picker: ^1.1.2
  image: ^4.3.0
  flutter_image_clipboard: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/app_icon.png
  android: true
  ios: true
  macos:
    generate: true
    image_path: assets/app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/snapshot_golden.json
    - assets/app_icon.png
    - assets/pieces/
