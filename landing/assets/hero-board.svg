<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="glow" x1="400" y1="60" x2="400" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8fbc9f" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#2e4a3e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b58863" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="800" height="680" fill="url(#glow)"/>
  <!-- 8×8 čtvercová síť: 70×70 px na pole (560×560), dříve 560×320 dělalo obdélníková „pole“ -->
  <g opacity="0.5" stroke="#6fa986" stroke-width="0.75" filter="url(#blur)">
    <g transform="translate(120 72)">
      <rect x="0" y="0" width="560" height="560" rx="4" fill="none"/>
      <g stroke-opacity="0.7">
        <line x1="70" y1="0" x2="70" y2="560"/>
        <line x1="140" y1="0" x2="140" y2="560"/>
        <line x1="210" y1="0" x2="210" y2="560"/>
        <line x1="280" y1="0" x2="280" y2="560"/>
        <line x1="350" y1="0" x2="350" y2="560"/>
        <line x1="420" y1="0" x2="420" y2="560"/>
        <line x1="490" y1="0" x2="490" y2="560"/>
        <line x1="0" y1="70" x2="560" y2="70"/>
        <line x1="0" y1="140" x2="560" y2="140"/>
        <line x1="0" y1="210" x2="560" y2="210"/>
        <line x1="0" y1="280" x2="560" y2="280"/>
        <line x1="0" y1="350" x2="560" y2="350"/>
        <line x1="0" y1="420" x2="560" y2="420"/>
        <line x1="0" y1="490" x2="560" y2="490"/>
      </g>
    </g>
  </g>
</svg>
